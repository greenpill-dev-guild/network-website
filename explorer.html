<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenpill Knowledge Explorer</title>
  <meta name="description" content="Explore the Greenpill network knowledge graph." />

  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./custom-styles.css" />
  <link rel="stylesheet" href="./explorer.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Volkhov&display=swap"
    rel="stylesheet" />

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" href="./src/images/greenpill-logo-large.png" type="image/png" sizes="150x150" />
  <link rel="shortcut icon" href="favicon.ico" />

  <meta property="og:title" content="Greenpill Knowledge Explorer" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://greenpill.network/explorer.html" />
  <meta property="og:image" content="https://greenpill.network/src/images/greenpill-twitter-card.png" />
  <meta property="og:description" content="Explore the Greenpill network knowledge graph." />

  <script src="https://unpkg.com/force-graph"></script>
</head>

<body class="explorer-body">
  <div class="explorer-shell">
    <header class="explorer-topbar">
      <a class="explorer-brand" href="./index.html#body">
        <img src="./src/images/greenpill-logo.svg" width="40" height="40" alt="Greenpill logo" />
        <div>
          <span class="eyebrow">Greenpill</span>
          <strong>Knowledge Explorer</strong>
        </div>
      </a>
      <nav class="explorer-nav">
        <a href="./index.html#network">Network</a>
        <a href="./index.html#podcast">Podcast</a>
        <a href="./index.html#participate">Participate</a>
        <a href="./index.html#explore">Home</a>
      </nav>
    </header>

    <main class="explorer-main">
      <section class="control-panel">
        <div class="control-group">
          <span class="control-label">Dataset</span>
          <div class="pill-row" id="dataset-pills"></div>
        </div>

        <form class="search-group" id="search-form">
          <label class="control-label" for="node-search">Find a node</label>
          <div class="search-row">
            <input id="node-search" list="node-search-list" type="search"
              placeholder="Gitcoin, Greenpill Garden, Kevin Owocki..." />
            <datalist id="node-search-list"></datalist>
            <button type="submit" class="primary">Focus</button>
          </div>
        </form>
      </section>

      <section class="explorer-grid">
        <article class="stage-card">
          <div class="stage-header">
            <div>
              <p class="eyebrow">Interactive map</p>
              <h2 id="stage-title">Bridge View</h2>
            </div>
          </div>

          <div class="legend-bar">
            <span class="legend-item"><i class="legend-dot layer-network"></i>Network</span>
            <span class="legend-item"><i class="legend-dot layer-podcast"></i>Podcast</span>
            <span class="legend-item"><i class="legend-dot layer-bridge"></i>Bridge</span>
            <span class="legend-item"><i class="legend-dot edge-capital"></i>Capital flow</span>
          </div>

          <div class="graph-wrap" id="graph-wrap">
            <div class="graph-surface" id="graph-2d"></div>
            <div class="graph-empty hidden" id="graph-empty">No nodes match the current filters.</div>
          </div>
        </article>

        <aside class="inspector-card">
          <div class="inspector-header">
            <div>
              <p class="eyebrow">Inspector</p>
              <h2>Node Details</h2>
            </div>
            <button class="secondary inspector-clear" id="clear-selection" type="button">Clear</button>
          </div>
          <div class="inspector-body" id="inspector-body"></div>
        </aside>
      </section>
    </main>
  </div>

  <script src="./explorer.js" defer></script>
</body>

</html>
